; Quantumult X DNS 规则配置
; ============================================
; 使用方法:
; 1. 下载此文件到 Quantumult X
; 2. 在 QX 的 配置 > 资源 > 远程文件 中添加此文件的链接
; 或直接将内容追加到 QX 配置文件末尾
;
; 注意: 此文件需要在订阅转换生成的配置之后添加,才能生效

[dns-server]
; 定义 DNS 服务器标签
label=国内DNS, 223.5.5.5
label=国外DNS, 8.8.8.8
label=直连DNS, 119.29.29.29

[dns-rule]
; 局域网域名 - 使用国内 DNS
domain-suffix=*.lan, 国内DNS
domain-suffix=*.local, 国内DNS

; 特定域名 - 使用直连 DNS
domain-suffix=*.smartcitybd.com, 直连DNS
domain=local.ptlogin2.qq.com, 直连DNS

; ============================================
; 在下方添加自定义 DNS 规则
; ============================================

; 示例: 指定域名使用特定 DNS
; domain-suffix=*.example.com, 直连DNS
; domain=specific.domain.com, 国外DNS

; 游戏类 - 使用国内 DNS 获得更好的延迟
; domain-suffix=*.mihoyo.com, 国内DNS
; domain-suffix=*.hoyoverse.com, 国内DNS
; domain-suffix=*.leagueoflegends.com, 国内DNS
; domain-suffix=*.riotgames.com, 国内DNS

; 银行/金融 - 使用直连 DNS
; domain-suffix=*.icbc.com.cn, 直连DNS
; domain-suffix=*.ccb.com, 直连DNS
; domain-suffix=*.boc.cn, 直连DNS

; ============================================
; 规则格式说明:
; ============================================
; domain-suffix=域名, DNS标签
;   - 匹配指定后缀的所有域名
;   - 例如: domain-suffix=*.google.com, 国外DNS
;
; domain=域名, DNS标签
;   - 精确匹配指定域名
;   - 例如: domain=www.google.com, 国外DNS
;
; domain-keyword=关键词, DNS标签
;   - 匹配包含关键词的域名
;   - 例如: domain-keyword=baidu, 国内DNS
;
; ip-cidr=IP段, DNS标签, no-resolve
;   - 匹配指定的 IP 段
;   - 例如: ip-cidr=192.168.0.0/16, 国内DNS, no-resolve
;
; geoip=国家代码, DNS标签
;   - 根据地理位置匹配
;   - 例如: geoip=CN, 国内DNS
;   - 例如: geoip=US, 国外DNS
